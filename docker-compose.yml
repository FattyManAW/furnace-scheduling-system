# ── 干式套管最佳化排爐系統 docker-compose.yml ─────────────────
# 前後端一體化部署：API (FastAPI) + Nginx (靜態 + 反向代理)
#
# 快速啟動:
#   docker compose up -d                 # 啟動 → http://localhost:8030
#   或 ./start.sh                        # 一鍵啟動腳本
#
# 常用指令:
#   docker compose up -d --build         # 強制 rebuild 後啟動
#   docker compose logs -f               # 即時日誌
#   docker compose down                  # 停止（保留資料）
#   docker compose down -v               # 停止 + 清除資料
#   docker compose restart               # 重啟


services:
  # ── 後端 API (FastAPI + SQLite) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: furnace-api:${TAG:-latest}
    container_name: furnace-api
    environment:
      - TZ=${TZ:-Asia/Taipei}
      - PORT=8002
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:8030}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    expose:
      - "8002"
    networks:
      - furnace-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── 前端 Nginx (靜態檔案 + API 反向代理) ───────────────────
  nginx:
    image: nginx:alpine
    container_name: furnace-nginx
    ports:
      - "${NGINX_PORT:-8030}:8030"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - furnace-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8030/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  furnace_data:
    name: furnace_scheduler_data

networks:
  furnace-net:
    name: furnace_network