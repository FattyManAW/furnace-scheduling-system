[tool.ruff]
# Elite Squad quality standard — ruff config
# Applied to: furnace-scheduling-system + OTD

target-version = "py39"
line-length = 100

[tool.ruff.lint]
# Phase 1: basic pycodestyle + pyflakes only
# Phase 2 (future): add W, I, N, UP, B, SIM
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
]
ignore = [
    "E501",  # line too long
    "E401",  # multiple imports on one line (legacy code pattern)
    "F401",  # unused imports (legacy — fix in Phase 2)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint.isort]
known-first-party = ["backend", "frontend", "agents", "erp_sim"]