# Language: python (3.12)
# Date: 2026-05-21T03:17:07Z

name: Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  COVERAGE_THRESHOLD: 60

jobs:
  dev-gate:
    name: "🔍 Dev Gate — Lint + Import"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Ruff lint
        run: ruff check . --select E,F || exit 1
      - name: Import check
        run: |
          python -c "
          import os, sys
          errors=[]
          for r,d,files in os.walk('.'):
              d[:]=[x for x in d if not x.startswith('.') and x!='__pycache__' and x!='node_modules']
              for f in files:
                  if f.endswith('.py') and not f.startswith('_'):
                      try: compile(open(os.path.join(r,f)).read(), f, 'exec')
                      except SyntaxError as e: errors.append(f'{os.path.join(r,f)}: {e}')
          if errors:
              for e in errors: print(f'❌ {e}')
              sys.exit(1)
          print('✅ All compile clean')
          "

  qa-gate:
    name: "🧪 QA Gate — Pytest + Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: dev-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          cd backend && pytest tests/ -v --cov=. --cov-report=term --cov-report=json:coverage.json
      - name: Coverage check
        run: |
          COV=$(python -c "import json; d=json.load(open('coverage.json')); print(f\"{d['totals']['percent_covered']:.1f}\")")
          echo "Coverage: ${COV}%"
          python -c "exit(0 if float('$COV') >= 60 else 1)" || { echo "❌ Below threshold 60%"; exit 1; }

  deploy-gate:
    name: "🚀 Deploy Gate — Docker + Health"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: qa-gate
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t app-gate .
      - name: HEALTHCHECK audit
        run: |
          if grep -q 'localhost' Dockerfile 2>/dev/null; then
            echo "⚠️  localhost → use 127.0.0.1"
          fi

  docs-gate:
    name: "📚 Docs Gate — README"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-gate
    steps:
      - uses: actions/checkout@v4
      - name: README check
        run: |
          if [ -f README.md ]; then
            echo "✅ README.md found ($(wc -l < README.md) lines)"
          else
            echo "❌ No README.md"
            exit 1
          fi

  gate-summary:
    name: "🏁 Summary"
    runs-on: ubuntu-latest
    needs: [dev-gate, qa-gate, deploy-gate, docs-gate]
    if: always()
    steps:
      - name: Report
        run: |
          echo "🔍 Dev:    ${{ needs.dev-gate.result }}"
          echo "🧪 QA:     ${{ needs.qa-gate.result }}"
          echo "🚀 Deploy: ${{ needs.deploy-gate.result }}"
          echo "📚 Docs:   ${{ needs.docs-gate.result }}"
